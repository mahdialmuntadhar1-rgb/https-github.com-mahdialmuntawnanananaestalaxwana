name: Build, Test, and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Firestore security tests in emulator
        run: npm run test:rules:ci

      - name: Deploy to Firebase Hosting and Functions (prod alias)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools deploy --project prod --only hosting,functions --non-interactive --token "$FIREBASE_TOKEN"
